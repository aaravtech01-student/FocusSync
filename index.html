<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FocusSync - Pomodoro Timer</title>

<style>

body{
background-color:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
margin:0;
font-family:'Poppins',sans-serif;
padding-top:30px;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
text-align:center;
}

.heading{
color:white;
}

.card{
background-color:rgba(255,255,255,0.1);
padding:30px;
border-radius:12px;
color:antiquewhite;
box-shadow:0 4px 15px rgba(0,0,0,0.3);

display:flex;
flex-direction:column;
align-items:center;
}

#time{
width:250px;

font-size:64px;
font-weight:bold;
text-align:center;

margin-top:10px;
padding:10px;

background-color:rgba(0,0,0,0.3);
color:white;

border:none;
outline:none;
border-radius:10px;
}

.buttons{
display:flex;
gap:10px;
}

button{
background-color:darkcyan;
padding:10px 25px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-size:16px;
}

button:hover{
background-color:cyan;
}

</style>
</head>

<body>

<h1 class="heading">FocusSync</h1>

<div class="container">

<div class="card">

<h2>Pomodoro Timer</h2>

<input type="text" id="time" value="25:00">

</div>

<div class="buttons">

<button id="startbtn">Start</button>
<button id="pausebtn">Pause</button>
<button id="resetbtn">Reset</button>

</div>

</div>

<script>

let time = 1500;
let interval = null;

function update() {

let min = Math.floor(time / 60);
let sec = time % 60;

document.getElementById("time").value =
`${min}:${sec < 10 ? "0" : ""}${sec}`;

}

function tick(){

if(time > 0){

time--;
update();

}else{

clearInterval(interval);
interval = null;

}

}

function start(){

if(interval) return;

interval = setInterval(tick,1000);

}

function pause(){

clearInterval(interval);
interval = null;

}

function reset(){

pause();
time = 1500;
update();

}

document.getElementById("startbtn")
.addEventListener("click", start);

document.getElementById("pausebtn")
.addEventListener("click", pause);

document.getElementById("resetbtn")
.addEventListener("click", reset);

document.getElementById("time")
.addEventListener("change", function(){

let value = this.value;

let parts = value.split(":");

let min = parseInt(parts[0]);
let sec = parts[1] ? parseInt(parts[1]) : 0;

if(isNaN(min) || isNaN(sec)) return;

time = (min * 60) + sec;

update();

});

update();

</script>

</body>
</html>





  
  












</script>
</html>
